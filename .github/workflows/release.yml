# Cut a GitHub release from a v* tag: cross-platform binaries via GoReleaser.
#
#   git tag -a v0.1.0 -m "cljgo 0.1.0" && git push origin v0.1.0
#
# The tag must be plain SemVer (v0.1.0) — that is also what `go install
# github.com/muthuishere/cljgo/cmd/cljgo@v0.1.0` resolves against, so the
# module path and the release stay in lockstep.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release, upload the archives

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser builds the changelog from commit history; a shallow
          # clone would silently produce an empty one.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Don't ship a release that fails its own gates.
      - name: go test
        run: go test ./...
        env:
          # Same host-relative boot budget as ci.yml (ADR 0024) — this runs on
          # the same shared runners, where the 250ms default is a property of
          # the owner's machine, not of the code.
          CLJGO_BOOT_BUDGET: 5s
          # Same reasoning for the emitted-vs-raw-Go ratio (ADR 0024): it
          # divides two independently measured net times, so a contended
          # runner swings the quotient (63.2x observed vs ~35x local, passing
          # on rerun). 120 stays far under the ~168x naive-emission regression
          # the gate exists to catch.
          CLJGO_PERF_RATIO_MAX: "120"
          # Channel-op budgets (ADR 0040 / ADR 0024): same loosened runner
          # ceilings as ci.yml — ratios of two same-host measurements.
          CLJGO_CHAN_TAX_MAX: "3"
          CLJGO_ALTS_TAX_MAX: "10"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
