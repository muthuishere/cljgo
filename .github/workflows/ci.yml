# The gates from CLAUDE.md, enforced on every push and PR:
#
#   go build ./... && go vet ./... && gofmt -l pkg cmd conformance templates && go test ./...
#
# All green, no exceptions. Kept as separate steps so a red badge points at
# which gate failed without opening the log.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # cljgo shells out to the Go toolchain to build, and emits Go that
        # must compile everywhere we ship a binary — so the suite runs on all
        # three, not just Linux. A REPL-vs-binary divergence is a release
        # blocker (CLAUDE.md), and it would most likely show up as a
        # platform difference.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      # gofmt exits 0 even when it has complaints — it just lists files. Fail
      # explicitly on any output. Only on Linux: gofmt is platform-identical,
      # and CRLF checkout on Windows makes it noisy for no signal.
      - name: gofmt
        if: runner.os == 'Linux'
        run: |
          unformatted=$(gofmt -l pkg cmd conformance templates)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt: these files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        # -timeout is per-package (default 10m). The conformance package
        # compiles a fresh binary per test file across the dual harness
        # (~390 files, ~350s isolated) and creeps toward that default as the
        # suite grows; 30m gives headroom on a slow/contended runner without
        # masking a real hang. (The compiled harness is being restructured to
        # run its go-build/run subprocess phase in parallel — until then the
        # timeout is the safety net.)
        run: go test -timeout 30m ./...
        env:
          # The boot budget is host-relative (ADR 0024). ADR 0019's 250ms was
          # calibrated on the owner's machine; the same code boots in 181ms
          # there, 349ms on a macos runner and 3.55s on an ubuntu one. 5s
          # absorbs that runner variance while staying ~20x under any real
          # pathology (an O(n²) blowup is seconds-to-minutes, not a constant
          # factor), so the gate still does the job ADR 0019 gave it.
          CLJGO_BOOT_BUDGET: 5s
          # Same reasoning for the emitted-vs-raw-Go ratio (ADR 0024): it
          # divides two independently measured net times, so a contended
          # runner swings the quotient (63.2x observed vs ~35x local, passing
          # on rerun). 120 stays far under the ~168x naive-emission regression
          # the gate exists to catch.
          CLJGO_PERF_RATIO_MAX: "120"
          # The clojure.core-mediated gate (ADR 0037 #5): a wall-clock total,
          # ~110ms locally, 350ms local budget, 3s here for slower/contended
          # runners. Still tight enough to catch the class of core-path
          # regression the user-code-only gate was structurally blind to.
          CLJGO_CORE_REDUCE_BUDGET: 3s
          # The map/filter pipeline gate (ADR 0063): (count (filter odd? (map
          # inc (range 2e6)))) — a wall-clock total, ~273ms locally with
          # chunk-aware map/filter, 600ms local budget, 8s here for the same
          # slow/contended-runner headroom the reduce gate gets. Closes the
          # blind spot where the range-only reduce gate never exercised
          # map/filter.
          CLJGO_CORE_PIPELINE_BUDGET: 8s
          # Channel-op budgets (ADR 0040 / ADR 0024, pkg/lang
          # chan_budget_test.go): local defaults are 1.5x wrapper-vs-raw
          # and 5x alts-vs-static-select (S19 measured 1.37x/1.9x). Both
          # are ratios of two same-host measurements, so runner contention
          # swings the quotient — 3x/10x stays far under the pathology the
          # gates exist to catch (S19's rejected handler-queue channel was
          # 2.7-5.6x on EVERY op, and a lock/alloc regression lands there).
          CLJGO_CHAN_TAX_MAX: "3"
          CLJGO_ALTS_TAX_MAX: "10"
